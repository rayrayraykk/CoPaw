<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>做IP，拼的是长期复利</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Long+Cang&family=ZCOOL+KuaiLe&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1920px;
      background: #F5E6D3;
      font-family: 'Ma Shan Zheng', cursive;
      padding: 80px 60px;
      position: relative;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 35px, rgba(0,0,0,.03) 35px, rgba(0,0,0,.03) 36px);
    }

    /* 主标题 */
    .main-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 96px;
      text-align: center;
      margin-bottom: 40px;
      line-height: 1.1;
      position: relative;
      padding: 40px 0;
    }

    .title-red {
      color: #D32F2F;
      display: block;
      text-shadow:
        4px 4px 0px rgba(0,0,0,0.1),
        -2px -2px 0px rgba(255,255,255,0.3);
      transform: rotate(-2deg);
    }

    .title-black {
      color: #1A1A1A;
      display: block;
      text-shadow:
        4px 4px 0px rgba(211, 47, 47, 0.2);
      transform: rotate(1deg);
    }

    /* 副标题装饰 */
    .subtitle {
      text-align: center;
      font-size: 36px;
      color: #666;
      margin-bottom: 80px;
      font-family: 'Long Cang', cursive;
    }

    /* 内容区块 */
    .content-section {
      margin: 60px 0;
      position: relative;
    }

    /* 编号圆圈 */
    .number-circle {
      position: absolute;
      left: -40px;
      top: 20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D32F2F, #F44336);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      box-shadow: 0 8px 24px rgba(211, 47, 47, 0.4);
      font-family: 'ZCOOL KuaiLe', cursive;
    }

    /* 内容卡片 */
    .content-card {
      background: white;
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.08),
        inset 0 0 0 3px #F5E6D3;
      margin-left: 60px;
      position: relative;
    }

    .card-title {
      font-size: 48px;
      color: #1A1A1A;
      margin-bottom: 24px;
      font-family: 'Ma Shan Zheng', cursive;
      line-height: 1.3;
    }

    .card-content {
      font-size: 32px;
      line-height: 1.8;
      color: #333;
      font-family: 'Long Cang', cursive;
    }

    .highlight {
      color: #D32F2F;
      font-size: 40px;
      font-weight: bold;
      text-decoration: underline;
      text-decoration-color: #F44336;
      text-decoration-thickness: 3px;
      text-underline-offset: 6px;
    }

    /* 手绘插画 */
    .illustration {
      width: 180px;
      height: 180px;
      position: absolute;
      right: 40px;
      top: -40px;
    }

    .illustration-emoji {
      font-size: 140px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(5deg);
      }
    }

    /* 强调框 */
    .emphasis-box {
      background: linear-gradient(135deg, #FFEBEE, #FCE4EC);
      border: 4px solid #D32F2F;
      border-radius: 20px;
      padding: 50px;
      margin: 80px 0;
      text-align: center;
      position: relative;
      box-shadow: 0 12px 40px rgba(211, 47, 47, 0.2);
    }

    .emphasis-box::before {
      content: '★';
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 64px;
      color: #D32F2F;
    }

    .emphasis-title {
      font-size: 56px;
      color: #D32F2F;
      margin-bottom: 24px;
      font-family: 'Ma Shan Zheng', cursive;
    }

    .emphasis-content {
      font-size: 36px;
      color: #1A1A1A;
      line-height: 1.6;
      font-family: 'Long Cang', cursive;
    }

    /* 底部鼓励语 */
    .footer-encouragement {
      text-align: center;
      margin-top: 100px;
      padding-top: 60px;
      border-top: 4px dashed #D32F2F;
    }

    .footer-text {
      font-size: 48px;
      color: #D32F2F;
      font-family: 'Ma Shan Zheng', cursive;
      margin-bottom: 24px;
    }

    .footer-icons {
      font-size: 56px;
    }

    /* 装饰元素 */
    .deco-arrow {
      position: absolute;
      font-size: 48px;
      color: #D32F2F;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>
<body>
  <!-- 主标题 -->
  <div class="main-title">
    <span class="title-red">做IP，拼的是</span>
    <span class="title-black">长期复利</span>
  </div>

  <div class="subtitle">
    坚持每日出摊 · 别怕慢 · 就怕停
  </div>

  <!-- 内容区1 -->
  <div class="content-section">
    <div class="number-circle">1</div>
    <div class="content-card">
      <div class="illustration">
        <span class="illustration-emoji">📈</span>
      </div>
      <h3 class="card-title">长期复利</h3>
      <p class="card-content">
        今天一点，明天一点，<br>
        <span class="highlight">越做越值钱</span>
      </p>
    </div>
  </div>

  <!-- 内容区2 -->
  <div class="content-section">
    <div class="number-circle">2</div>
    <div class="content-card">
      <div class="illustration">
        <span class="illustration-emoji">🏪</span>
      </div>
      <h3 class="card-title">每日出摊</h3>
      <p class="card-content">
        稳定出现，<br>
        <span class="highlight">比偶尔爆发更重要</span>
      </p>
    </div>
  </div>

  <!-- 内容区3 -->
  <div class="content-section">
    <div class="number-circle">3</div>
    <div class="content-card">
      <div class="illustration">
        <span class="illustration-emoji">🌱</span>
      </div>
      <h3 class="card-title">持续输出</h3>
      <p class="card-content">
        别怕慢，就怕停，<br>
        <span class="highlight">做着做着就成了</span>
      </p>
    </div>
  </div>

  <!-- 装饰箭头 -->
  <div class="deco-arrow" style="left: 50px; top: 650px;">↓</div>
  <div class="deco-arrow" style="right: 80px; top: 1100px; animation-delay: 0.5s;">↓</div>

  <!-- 强调框 -->
  <div class="emphasis-box">
    <div class="emphasis-title">坚持到最后</div>
    <div class="emphasis-content">
      因为 <span class="highlight">99%</span> 的人<br>
      都坚持不住！<br>
      <span style="font-size: 48px; color: #D32F2F;">★</span>
    </div>
  </div>

  <!-- 底部鼓励 -->
  <div class="footer-encouragement">
    <div class="footer-text">慢慢来，比较快。持续做，终有光！</div>
    <div class="footer-icons">💪 🔥 ⭐ 🎯</div>
  </div>
</body>
</html>
