# Build desktop app: macOS .app -> DMG (optional sign/notarize), Windows onedir -> Inno Setup.
# Triggers: on release published, or manually with version input. Artifacts named by version.
name: Desktop Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version for artifacts and release (e.g. 1.2.3 or v1.2.3)"
        required: true
        type: string
      upload_release:
        description: "Upload DMG and Setup.exe to GitHub Release with this version"
        required: false
        type: boolean
        default: false

env:
  COPAW_DESKTOP_ENTRY: scripts/pack/copaw_desktop_main.py
  APP_NAME: CoPaw
  # Release event: use tag_name; manual: use inputs.version
  VERSION: ${{ github.event.release.tag_name || github.event.inputs.version }}

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[desktop]" nuitka ordered-set
          pip install -r scripts/pack/requirements-pack.txt 2>/dev/null || true

      - name: Build .app with Nuitka
        run: |
          python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --macos-app-mode=gui \
            --output-dir=dist \
            --output-filename=CoPaw \
            --include-package=copaw \
            --include-package-data=copaw \
            --assume-yes-for-downloads \
            "${{ env.COPAW_DESKTOP_ENTRY }}"
          ls -la dist/

      - name: Code sign (optional)
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          codesign --force --deep --sign - dist/CoPaw.app
          rm -f certificate.p12

      - name: Create DMG
        run: |
          mkdir -p dmg_src
          cp -R dist/CoPaw.app dmg_src/
          git clone --depth 1 https://github.com/create-dmg/create-dmg.git create_dmg_repo
          ./create_dmg_repo/create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --window-size 600 400 \
            --icon "${{ env.APP_NAME }}.app" 150 190 \
            --app-drop-link 450 190 \
            dist/CoPaw-${{ env.VERSION }}.dmg dmg_src/

      - name: Notarize and staple (optional)
        if: ${{ secrets.APPLE_APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' }}
        env:
          APPLE_APPLE_ID: ${{ secrets.APPLE_APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "dist/CoPaw-${{ env.VERSION }}.dmg" \
            --apple-id "$APPLE_APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "dist/CoPaw-${{ env.VERSION }}.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoPaw-macOS
          path: dist/CoPaw-${{ env.VERSION }}.dmg

  build-windows:
    runs-on: windows-latest
    env:
      VERSION: ${{ env.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[desktop]" nuitka ordered-set
          if (Test-Path scripts/pack/requirements-pack.txt) {
            pip install -r scripts/pack/requirements-pack.txt
          }

      - name: Build onedir with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --output-dir=dist `
            --output-filename=CoPaw `
            --include-package=copaw `
            --include-package-data=copaw `
            --assume-yes-for-downloads `
            "$env:COPAW_DESKTOP_ENTRY"
          dir dist

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Create Setup.exe with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DRunNumber=$env:VERSION scripts/pack/CoPaw.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoPaw-Windows
          path: dist/CoPaw-Setup-${{ env.VERSION }}.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.upload_release == 'true'
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: CoPaw-macOS
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CoPaw-Windows
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CoPaw-macOS/*.dmg
            CoPaw-Windows/*.exe
          tag_name: ${{ env.VERSION }}
          name: CoPaw ${{ env.VERSION }}
          fail_unchanged: false
