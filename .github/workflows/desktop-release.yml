# Build CoPaw Desktop: Windows (conda-pack + NSIS), macOS (conda-pack -> .app)
# Runs automatically on release publish; also manually via Actions tab.

name: CoPaw Desktop Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.10"
          activate-environment: "copaw-build"
          miniforge-variant: Miniforge3

      - name: Install NSIS
        uses: negrutiu/nsis-install@v2

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/pack/build_win.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoPaw-Desktop-Windows
          path: dist/CoPaw-Setup-*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.10"
          activate-environment: "copaw-build"
          miniforge-variant: Miniforge3

      - name: Build macOS .app
        run: |
          chmod +x scripts/pack/build_macos.sh
          CREATE_ZIP=1 ./scripts/pack/build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoPaw-Desktop-macOS
          path: dist/CoPaw-*.zip

  upload-release:
    needs: [build-windows, build-macos]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Move artifacts to root for upload
        run: |
          mv CoPaw-Desktop-Windows/CoPaw-Setup-*.exe . 2>/dev/null || true
          mv CoPaw-Desktop-macOS/CoPaw-*.zip . 2>/dev/null || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CoPaw-Setup-*.exe
            CoPaw-*-macOS.zip
          fail-on-unmatched-files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
