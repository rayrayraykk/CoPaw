name: Pre-commit Checks

on: [push, pull_request]

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: true
    env:
      OS: ubuntu-24.04
      PYTHON: "3.10"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Update setuptools and wheel
        run: |
          pip install setuptools==68.2.2 wheel==0.41.2

      - name: Install CoPaw with dev dependencies
        run: |
          pip install -q -e ".[dev]"

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install pre-commit hooks
        run: |
          pre-commit install

      - name: Run pre-commit
        timeout-minutes: 20
        run: |
          pre-commit run --all-files 2>&1 | tee pre-commit.log || true
          if grep -q Failed pre-commit.log; then
            echo -e "\e[41m  [**FAIL**] pre-commit checks failed. Run 'pre-commit run --all-files' locally, commit any auto-fixes, then push again. \e[0m"
            exit 1
          fi
          echo -e "\e[46m  ********************************Passed******************************** \e[0m"
