name: Pre-commit Checks

on: [push, pull_request]

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: true
    env:
      OS: ubuntu-24.04
      PYTHON: "3.10"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Update setuptools and wheel
        run: |
          pip install setuptools==68.2.2 wheel==0.41.2

      - name: Install CoPaw with dev dependencies
        run: |
          pip install -q -e ".[dev]"

      - name: Install pre-commit hooks
        timeout-minutes: 15
        run: |
          echo "Installing all pre-commit hook environments..."
          pre-commit install-hooks

      - name: Run pre-commit checks
        timeout-minutes: 20
        run: |
          echo "Running pre-commit on all files..."
          if ! pre-commit run --all-files --show-diff-on-failure; then
            echo ""
            echo -e "\e[41m  [**FAIL**] pre-commit checks failed  \e[0m"
            echo ""
            echo "Pre-commit checks detected issues. Please:"
            echo "1. Run 'pre-commit run --all-files' locally"
            echo "2. Review and commit any auto-fixes"
            echo "3. Push the changes"
            exit 1
          fi
          echo ""
          echo -e "\e[46m  ********************************Passed******************************** \e[0m"
