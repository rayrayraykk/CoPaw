# Build CoPaw macOS DMG on release and attach to the GitHub Release.
# Users can download CoPaw-<version>.dmg from the release page.
# Compatible with macOS 10.15+ (Catalina and later; Intel and Apple Silicon).
#
# If users see "damaged" or cannot open after download (Gatekeeper on unsigned
# apps), they can: right-click the .app → Open, or run in Terminal:
#   xattr -cr ~/Downloads/CoPaw-*.dmg
# then open the DMG again.
name: Release macOS DMG

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version or tag"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build console frontend
        run: |
          cd console && npm ci && npm run build

      - name: Copy console into package
        run: |
          rm -rf src/copaw/console
          mkdir -p src/copaw/console
          cp -R console/dist/* src/copaw/console/

      - name: Install Python deps and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build DMG
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          VERSION_ARG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          if [[ -n "$VERSION_ARG" ]]; then
            bash scripts/macos/build_dmg.sh "$VERSION_ARG"
          else
            bash scripts/macos/build_dmg.sh
          fi

      - name: Sign app and recreate DMG (ad-hoc)
        shell: bash
        run: |
          set -euo pipefail

          APP_DIR="dist/CoPaw.app"
          DMG_GLOB="dist/CoPaw-*.dmg"

          if [[ ! -d "$APP_DIR" ]]; then
            echo "No $APP_DIR found" >&2
            exit 1
          fi

          # Remove packaging metadata not needed at runtime
          find "$APP_DIR" -type d -name "*.dist-info" -print0 | xargs -0 rm -rf || true

          # Some Python packages ship marker files like py.typed which are not Mach-O.
          # They can trigger subcomponent checks during bundle signing in some layouts.
          find "$APP_DIR" -type f -name "py.typed" -delete || true

          # Ad-hoc sign only Mach-O files (executables, dylibs, extension modules).
          # Using `file` avoids trying to sign text/data files.
          while IFS= read -r -d '' f; do
            if file -b "$f" | grep -qE 'Mach-O'; then
              codesign --force --sign - "$f"
            fi
          done < <(find "$APP_DIR" -type f -print0)

          # Sign main executable explicitly (belt-and-suspenders)
          if [[ -f "$APP_DIR/Contents/MacOS/CoPaw" ]]; then
            codesign --force --sign - "$APP_DIR/Contents/MacOS/CoPaw"
          fi

          # Finally sign the app bundle (no --deep; PyInstaller layout may include non-bundles/symlinks)
          codesign --force --sign - "$APP_DIR"

          # Recreate DMG so it contains the signed app
          DMG_NAME="$(ls $DMG_GLOB 2>/dev/null | head -1 || true)"
          if [[ -z "${DMG_NAME:-}" ]]; then
            echo "No DMG found" >&2
            exit 1
          fi

          VERSION="$(basename "$DMG_NAME" .dmg | sed 's/^CoPaw-//')"
          rm -f "$DMG_NAME"

          hdiutil create -volname "CoPaw $VERSION" -srcfolder "$APP_DIR" \
            -ov -format UDZO "$DMG_NAME"

      - name: Upload DMG to Release
        if: github.event_name == 'release' && github.event.action == 'published'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.dmg --clobber

      - name: Upload DMG (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: CoPaw-macOS-DMG
          path: dist/*.dmg
