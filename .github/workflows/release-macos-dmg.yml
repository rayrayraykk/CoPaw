# macOS desktop build. Windows can be added as a separate workflow (e.g. release-windows.yml).
name: Release macOS DMG

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version or tag"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: console/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install librsvg (for correct app icon rendering)
        run: brew install librsvg

      - name: Build console frontend
        run: |
          cd console && npm ci && npm run build

      - name: Copy console into package
        run: |
          rm -rf src/copaw/console
          mkdir -p src/copaw/console
          cp -R console/dist/* src/copaw/console/

      - name: Create venv and install Python deps and PyInstaller
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e ".[full]"
          .venv/bin/pip install pyinstaller pywebview

      - name: Build DMG (release + dev)
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          VERSION_ARG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          if [[ -n "$VERSION_ARG" ]]; then
            bash scripts/pack/macos/build_dmg.sh "$VERSION_ARG" --all
          else
            bash scripts/pack/macos/build_dmg.sh --all
          fi

      - name: Ad-hoc sign apps and recreate DMGs (macOS compatibility)
        shell: bash
        run: |
          set -euo pipefail

          # Only *.dist-info dirs are renamed (no dot) so codesign --deep does not treat as bundle.
          # Do NOT rename python3.* — embedded runtime expects that path; renaming breaks encodings.
          fix_dotted_dirs_for_codesign() {
            local internal="$1"
            [[ -d "$internal" ]] || return 0
            local path name dir_renamed
            while IFS= read -r -d '' path; do
              [[ -d "$path" ]] && ! [[ -L "$path" ]] || continue
              name=$(basename "$path")
              [[ "$name" != *.* ]] && continue
              dir_renamed=$(dirname "$path")/${name//./}
              [[ "$dir_renamed" != "$path" ]] && [[ ! -e "$dir_renamed" ]] || continue
              mv "$path" "$dir_renamed"
              ln -s "$(basename "$dir_renamed")" "$path"
            done < <(find "$internal" -maxdepth 1 -type d -name "*.dist-info" -print0)
          }

          # Sign app bundle: fix dotted dirs, sign all Mach-O, then app with --deep.
          sign_app_bundle() {
            local APP_DIR="$1"
            [[ -d "$APP_DIR" ]] || return 0

            find "$APP_DIR" -type f -name "py.typed" -delete || true
            find "$APP_DIR" -type f -name ".hash" -delete || true
            mkdir -p "$APP_DIR/Contents/Resources"

            local internal="$APP_DIR/Contents/Frameworks/_internal"
            fix_dotted_dirs_for_codesign "$internal"

            # 1) Sign all Mach-O binaries (dylib/so/exe) so nested code is signed
            while IFS= read -r -d '' f; do
              if /usr/bin/file -b "$f" | /usr/bin/grep -q 'Mach-O'; then
                /usr/bin/codesign --force --sign - --timestamp=none "$f"
              fi
            done < <(find "$APP_DIR" -type f -print0)

            # 2) Sign the app bundle with --deep (seals nested _internal; required on macOS 15+)
            /usr/bin/codesign --force --sign - --timestamp=none --deep "$APP_DIR"

            # 3) Verify: fail the job if invalid
            /usr/bin/codesign --verify --strict --verbose=4 "$APP_DIR"
          }

          sign_app_bundle "dist/CoPaw.app"
          sign_app_bundle "dist/CoPaw-Dev.app"

          # Recreate release DMG (exclude CoPaw-Dev-*.dmg)
          RELEASE_DMG="$(ls dist/CoPaw-*.dmg 2>/dev/null | grep -v 'CoPaw-Dev-' | head -1 || true)"
          if [[ -n "${RELEASE_DMG:-}" ]]; then
            VERSION="$(basename "$RELEASE_DMG" .dmg | sed 's/^CoPaw-//')"
            rm -f "$RELEASE_DMG"
            /usr/bin/hdiutil detach "/Volumes/CoPaw $VERSION" -force 2>/dev/null || true
            /usr/bin/hdiutil create -volname "CoPaw $VERSION" -srcfolder dist/CoPaw.app \
              -ov -format UDZO "$RELEASE_DMG"
          fi

          # Recreate dev DMG
          DEV_DMG="$(ls dist/CoPaw-Dev-*.dmg 2>/dev/null | head -1 || true)"
          if [[ -n "${DEV_DMG:-}" ]]; then
            VERSION="$(basename "$DEV_DMG" .dmg | sed 's/^CoPaw-Dev-//')"
            rm -f "$DEV_DMG"
            /usr/bin/hdiutil detach "/Volumes/CoPaw Dev $VERSION" -force 2>/dev/null || true
            /usr/bin/hdiutil create -volname "CoPaw Dev $VERSION" \
              -srcfolder dist/CoPaw-Dev.app -ov -format UDZO "$DEV_DMG"
          fi

      - name: Upload DMG to Release
        if: github.event_name == 'release' && github.event.action == 'published'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.dmg --clobber

      - name: Prepare release DMG for artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p dist_release_artifact
          for f in dist/CoPaw-*.dmg; do
            [[ -f "$f" ]] && [[ "$f" != *"/CoPaw-Dev-"* ]] && cp "$f" dist_release_artifact/
          done

      - name: Upload DMG(s) separately (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: CoPaw-macOS-DMG-release
          path: dist_release_artifact/
          if-no-files-found: ignore

      - name: Upload Dev DMG separately (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: CoPaw-macOS-DMG-dev
          path: dist/CoPaw-Dev-*.dmg
          if-no-files-found: ignore