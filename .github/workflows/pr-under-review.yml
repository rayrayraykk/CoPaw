name: PR Under Review Label

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  add-under-review-label:
    # Only run on pull requests
    if: github.event.issue.pull_request || github.event.pull_request
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Add Under Review label
        uses: actions/github-script@v7
        with:
          script: |
            // Get commenter information and PR number
            let commenter;
            let prNumber;

            if (context.eventName === 'issue_comment') {
              commenter = context.payload.comment.user.login;
              prNumber = context.payload.issue.number;
            } else if (context.eventName === 'pull_request_review') {
              commenter = context.payload.review.user.login;
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'pull_request_review_comment') {
              commenter = context.payload.comment.user.login;
              prNumber = context.payload.pull_request.number;
            }

            core.info(`Processing comment from @${commenter} on PR #${prNumber}`);

            // Check if label already exists first
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const hasLabel = labels.some(label => label.name === 'Under Review');

            if (hasLabel) {
              core.info(`PR #${prNumber} already has "Under Review" label, skipping`);
              return;
            }

            // Get commenter's permission level
            core.info(`Checking permissions for @${commenter}`);

            let permission;
            try {
              const response = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: commenter,
              });
              permission = response.data;
            } catch (error) {
              // Handle bots or non-user accounts
              if (error.status === 404) {
                core.info(`@${commenter} is not a user (likely a bot), skipping`);
                return;
              }
              throw error;
            }

            core.info(`@${commenter} permission level: ${permission.permission}`);

            // Check if user has admin, maintain, or write permission
            const allowedPermissions = ['admin', 'maintain', 'write'];

            if (allowedPermissions.includes(permission.permission)) {
              // Add label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['Under Review'],
              });

              core.info(`Successfully added "Under Review" label to PR #${prNumber}`);
            } else {
              core.info(`@${commenter} has insufficient permissions (${permission.permission}), skipping label addition`);
            }
